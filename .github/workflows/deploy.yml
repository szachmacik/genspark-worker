name: Deploy genspark-worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [worker.js, wrangler.toml]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/genspark-worker.git .
      - run: npm install -g wrangler@3
      - name: Deploy
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Inject GROQ_KEY
        run: echo "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Fix CF routes
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for pat in "genspark.ofshore.dev/*" "clone.ofshore.dev/*"; do
            curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE/workers/routes" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d "{\"pattern\":\"$pat\",\"script\":\"genspark-worker\"}" || true
          done
      - run: sleep 8 && curl -sf "https://genspark-worker.maciej-koziej01.workers.dev/health" | head -c 200
